<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento de Internación — Trasplante Hepático</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f1efe8;color:#1a1a1a;}
.app{max-width:900px;margin:0 auto;background:#fff;min-height:100vh;}
.hdr{padding:.8rem 1rem;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;justify-content:space-between;background:#fff;position:sticky;top:0;z-index:10;}
.hdr h1{font-size:13px;font-weight:700;}
.hdr p{font-size:10px;color:#666;margin-top:1px;}
.sdot{width:8px;height:8px;border-radius:50%;background:#27a;display:inline-block;margin-right:4px;}
.slbl{font-size:11px;color:#666;}
.tabs{display:flex;border-bottom:1px solid #e0e0e0;background:#fff;}
.tab{flex:1;padding:.7rem;font-size:12px;text-align:center;cursor:pointer;color:#888;border:none;background:transparent;font-family:inherit;font-weight:500;}
.tab.on{color:#185FA5;border-bottom:2px solid #185FA5;}
.content{padding:.9rem 1rem;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.stat{background:#f8f7f5;border-radius:8px;padding:.7rem;border:1px solid #e8e8e8;text-align:center;}
.stat-n{font-size:22px;font-weight:700;}
.stat-l{font-size:10px;color:#888;margin-top:2px;}
.loc-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
.loc{flex:1;min-width:100px;border-radius:8px;padding:.6rem .8rem;border:1px solid #e0e0e0;}
.loc-uci{background:#FCEBEB;border-color:#F7C1C1;}
.loc-cim{background:#EAF3DE;border-color:#C0DD97;}
.loc-otro{background:#f8f7f5;}
.loc-n{font-size:18px;font-weight:700;}
.loc-uci .loc-n{color:#791F1F;}
.loc-cim .loc-n{color:#27500A;}
.loc-l{font-size:11px;font-weight:700;margin-top:1px;}
.loc-uci .loc-l{color:#791F1F;}
.loc-cim .loc-l{color:#27500A;}
.loc-l2{font-size:10px;color:#888;margin-top:2px;}
.loc-detalle{background:#fff;border:1px solid #ddd;border-radius:8px;padding:8px 12px;margin-bottom:1rem;}
.loc-sub-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:13px;}
.loc-sub-row:last-child{border-bottom:none;}
.loc-sub-n{font-weight:700;color:#185FA5;}

/* CARDS */
.card{border-radius:10px;border:1px solid #e0e0e0;background:#fff;margin-bottom:8px;cursor:pointer;overflow:hidden;}
.card:hover{border-color:#aaa;}
.card-top{display:flex;gap:8px;padding:10px 11px 8px;}
.strip{width:4px;border-radius:2px;min-height:50px;flex-shrink:0;}
.s-pre{background:#185FA5;}.s-post{background:#27500A;}.s-retx{background:#3C3489;}
.cname{font-weight:700;font-size:14px;}
.csub{font-size:11px;color:#666;margin-top:2px;line-height:1.4;}
.cbrow{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.cb{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.cb-pre{background:#E6F1FB;color:#185FA5;}
.cb-post{background:#EAF3DE;color:#27500A;}
.cb-retx{background:#EEEDFE;color:#3C3489;}
.cb-gray{background:#f0f0f0;color:#666;}
.cb-ok{background:#EAF3DE;color:#27500A;}
.cb-mal{background:#FCEBEB;color:#791F1F;}
.card-labs{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:6px 11px;background:#f8f7f5;border-top:1px solid #e8e8e8;}
.lbl{font-size:10px;color:#888;}.lbv{font-size:12px;font-weight:700;}
.card-dias{padding:5px 11px;border-top:1px solid #e8e8e8;background:#f8f7f5;font-size:10px;color:#666;display:flex;gap:10px;flex-wrap:wrap;}
.card-dias strong{color:#185FA5;}
.card-pend{padding:5px 11px;border-top:1px solid #FAC775;background:#FAEEDA;font-size:10px;color:#854F0B;font-weight:600;}
.card-alert{padding:5px 11px;border-top:1px solid #F7C1C1;background:#FCEBEB;font-size:10px;color:#791F1F;font-weight:600;}
.card-section{padding:6px 11px;border-top:1px solid #e8e8e8;}
.card-sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.card-sec-item{font-size:11.5px;line-height:1.5;color:#333;}
.card-problemas{background:#F5F0FF;}
.card-problemas .card-sec-lbl{color:#7B3F9E;}
.card-planes{background:#EAF7EC;}
.card-planes .card-sec-lbl{color:#1A7A3C;}
.card-alta{border-top:2px solid;}
.card-alta .card-sec-lbl{font-weight:700;}
.alta-si{background:#EAF3DE;border-color:#27500A;}
.alta-si .card-sec-lbl{color:#27500A;}
.alta-no{background:#FCEBEB;border-color:#791F1F;}
.alta-no .card-sec-lbl{color:#791F1F;}
.alta-organo{background:#EEEDFE;border-color:#3C3489;}
.alta-organo .card-sec-lbl{color:#3C3489;}
.add-btn{width:100%;padding:.8rem;border:1px dashed #ccc;border-radius:10px;background:transparent;color:#888;font-size:13px;font-family:inherit;cursor:pointer;margin-top:4px;}

/* FORM */
.sec-box{background:#f8f7f5;border-radius:10px;padding:.8rem;border:1px solid #e8e8e8;margin-bottom:.8rem;}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#888;margin-bottom:8px;}
.sec-lbl.green{color:#27500A;background:#EAF3DE;padding:3px 9px;border-radius:20px;display:inline-block;}
.sec-lbl.blue{color:#185FA5;background:#E6F1FB;padding:3px 9px;border-radius:20px;display:inline-block;}
.sec-lbl.purple{color:#3C3489;background:#EEEDFE;padding:3px 9px;border-radius:20px;display:inline-block;}
.sec-lbl.red{color:#791F1F;background:#FCEBEB;padding:3px 9px;border-radius:20px;display:inline-block;}
.sec-lbl.problemas-color{color:#7B3F9E;background:#F5F0FF;padding:3px 9px;border-radius:20px;display:inline-block;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.g4{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
@media(min-width:600px){.g4{grid-template-columns:1fr 1fr 1fr 1fr;}}
.gc2{grid-column:span 2;}.gca{grid-column:1/-1;}
.fld{display:flex;flex-direction:column;gap:3px;}
.fld label{font-size:11px;color:#666;font-weight:500;}
.fld input,.fld select,.fld textarea{font-size:14px;padding:8px 10px;border:1px solid #ddd;border-radius:7px;background:#fff;color:#1a1a1a;font-family:inherit;width:100%;}
.fld textarea{resize:vertical;min-height:60px;line-height:1.5;}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:#185FA5;}
.ar{display:flex;gap:4px;}.ar input{flex:2;}.ar select{flex:1;min-width:0;}
.ctx-box{border-radius:7px;padding:7px 10px;font-size:12px;margin-bottom:8px;line-height:1.5;}
.ctx-pre{background:#E6F1FB;color:#185FA5;}
.ctx-post{background:#EAF3DE;color:#27500A;}
.ctx-retx{background:#EEEDFE;color:#3C3489;}
.eval-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
@media(min-width:500px){.eval-grid{grid-template-columns:repeat(3,1fr);}}
.eval-item label{font-size:11px;color:#666;}
.eval-item select{font-size:13px;padding:6px 8px;border:1px solid #ddd;border-radius:7px;background:#fff;width:100%;}
.eval-item select.pend{border-color:#FAC775;background:#FAEEDA;color:#854F0B;}
.eval-item select.apto{border-color:#C0DD97;background:#EAF3DE;color:#27500A;}
.tw{display:flex;flex-wrap:wrap;gap:4px;padding:6px 8px;border:1px solid #ddd;border-radius:7px;background:#fff;min-height:40px;align-items:center;}
.tw input{border:none;outline:none;font-size:13px;background:transparent;min-width:80px;flex:1;padding:0;}
.tg{display:inline-flex;align-items:center;gap:3px;border-radius:20px;padding:3px 8px;font-size:11px;}
.img-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;font-size:12px;border:1px solid;}
.img-normal{background:#EAF3DE;border-color:#C0DD97;color:#27500A;}
.img-pato{background:#FCEBEB;border-color:#F7C1C1;color:#791F1F;}
.mov-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;font-size:12px;border:1px solid #ddd;background:#fff;}
.t-a{background:#E6F1FB;color:#0C447C;}.t-i{background:#FAEEDA;color:#633806;}.t-t{background:#EAF3DE;color:#27500A;}.t-c{background:#EEEDFE;color:#3C3489;}
.tx{cursor:pointer;opacity:.5;font-size:13px;padding:0 2px;}.tx:hover{opacity:1;}
.lab-hist{background:#f0f0f0;border-radius:7px;padding:7px 10px;font-size:11px;margin-top:6px;}
.lhr{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #e0e0e0;font-size:11px;}
.lhr:last-child{border-bottom:none;}
.peld-row{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;}
.peld-card{text-align:center;background:#E6F1FB;border-radius:8px;padding:8px 14px;border:1px solid #B5D4F4;}
.peld-n{font-size:22px;font-weight:700;color:#185FA5;}
.peld-l{font-size:10px;color:#666;margin-top:1px;}
.fk-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px;}
.fk-table th{background:#f0f0f0;padding:5px 7px;border:1px solid #e0e0e0;font-size:10px;color:#666;}
.fk-table td{padding:5px 7px;border:1px solid #e0e0e0;text-align:center;}
.sbox{background:#f8f7f5;border-radius:7px;padding:8px 11px;font-size:12px;color:#666;border:1px solid #e0e0e0;margin-top:8px;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.b-ok{background:#EAF3DE;color:#27500A;}.b-med{background:#FAEEDA;color:#854F0B;}.b-mal{background:#FCEBEB;color:#791F1F;}

/* BUTTONS */
.btn-pri{background:#185FA5;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;}
.btn-pri:active{opacity:.85;}
.btn-sec{background:#fff;color:#1a1a1a;border:1px solid #ccc;border-radius:8px;padding:10px 15px;font-size:14px;font-family:inherit;cursor:pointer;}
.btn-sec:hover{background:#f5f5f5;}
.btn-alta{background:#27500A;color:#fff;border:none;border-radius:8px;padding:10px 15px;font-size:14px;font-family:inherit;cursor:pointer;margin-left:auto;}
.btn-del{background:#fff;color:#791F1F;border:1px solid #F7C1C1;border-radius:8px;padding:10px 15px;font-size:14px;font-family:inherit;cursor:pointer;}
.form-actions{display:flex;gap:8px;padding-bottom:1.5rem;flex-wrap:wrap;margin-top:.5rem;}

/* DETAIL */
.det-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.8rem;gap:8px;}
.det-name{font-size:17px;font-weight:700;}
.det-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.det-back{background:#fff;border:1px solid #ccc;border-radius:8px;padding:7px 12px;font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap;}
.det-sec{margin-bottom:.8rem;}
.det-slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#888;margin-bottom:7px;}
.det-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:13px;}
.det-row:last-child{border-bottom:none;}
.det-l{color:#888;min-width:130px;flex-shrink:0;font-size:12px;}
.det-v{flex:1;line-height:1.5;}
.det-v.pend{color:#854F0B;font-weight:600;}
.labgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:5px;}
.labcard{background:#f8f7f5;border-radius:7px;padding:7px 9px;border:1px solid #e8e8e8;}
.labcard-l{font-size:10px;color:#888;}
.labcard-v{font-size:14px;font-weight:700;margin-top:2px;}
.labcard-u{font-size:10px;font-weight:400;color:#888;}
.pillrow{display:flex;flex-wrap:wrap;gap:4px;}
.pend-banner{background:#FAEEDA;border:1px solid #FAC775;border-radius:8px;padding:8px 12px;margin-bottom:.8rem;font-size:12px;color:#854F0B;font-weight:600;}

/* 5-question detail sections */
.det-q-title{font-size:13px;font-weight:700;margin-bottom:8px;}
.det-q1{background:#F8F7F5;border-radius:10px;padding:12px 14px;border:1px solid #e8e8e8;}
.det-q2{background:#F0F6FC;border-radius:10px;padding:12px 14px;border:1px solid #C9E0F2;}
.det-q3{background:#F8F4FF;border-radius:10px;padding:12px 14px;border:1px solid #E0D0F8;}
.det-q3 .det-q-title{color:#7B3F9E;}
.det-q4{background:#EFFAF1;border-radius:10px;padding:12px 14px;border:1px solid #C0E8C8;}
.det-q4 .det-q-title{color:#1A7A3C;}
.det-q5{border-radius:10px;padding:12px 14px;border:2px solid;}
.det-q5.alta-si{background:#EAF3DE;border-color:#27500A;}
.det-q5.alta-no{background:#FCEBEB;border-color:#791F1F;}
.det-q5.alta-organo{background:#EEEDFE;border-color:#3C3489;}
.dias-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.dias-card{background:#fff;border-radius:8px;padding:8px;text-align:center;border:1px solid #ddd;}
.dias-n{font-size:18px;font-weight:700;color:#185FA5;}
.dias-l{font-size:10px;color:#888;margin-top:2px;}
.par-problema-plan{border-bottom:1px solid #e8d5f5;padding:6px 0;}
.par-problema-plan:last-child{border-bottom:none;}
.problema-item,.plan-item{display:flex;gap:8px;align-items:flex-start;padding:3px 0;font-size:13px;line-height:1.5;}
.problema-num{background:#7B3F9E;color:#fff;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.plan-num{background:#1A7A3C;color:#fff;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.alta-banner{display:flex;gap:10px;align-items:flex-start;}
.offline-bar{background:#FAEEDA;border-bottom:1px solid #FAC775;padding:5px 1rem;font-size:11px;color:#633806;display:none;}
.offline-bar.show{display:block;}

.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f1efe8;padding:1rem;}
.login-card{background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:2rem;width:100%;max-width:360px;}
.login-logo{text-align:center;margin-bottom:1.5rem;}
.login-logo h1{font-size:16px;font-weight:700;color:#1a1a1a;margin-top:.5rem;}
.login-logo p{font-size:12px;color:#888;margin-top:3px;}
.login-field{margin-bottom:1rem;}
.login-field label{font-size:12px;color:#666;font-weight:500;display:block;margin-bottom:5px;}
.login-field input{width:100%;font-size:15px;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-family:inherit;color:#1a1a1a;}
.login-field input:focus{outline:none;border-color:#185FA5;}
.login-btn{width:100%;background:#185FA5;color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:.5rem;}
.login-btn:active{opacity:.85;}
.login-error{background:#FCEBEB;border:1px solid #F7C1C1;border-radius:7px;padding:8px 12px;font-size:12px;color:#791F1F;margin-top:.75rem;display:none;}
.login-error.show{display:block;}
.guia-btn{background:#fff;border:1px solid #ddd;border-radius:8px;padding:.75rem 1rem;font-size:13px;font-family:inherit;cursor:pointer;text-align:left;font-weight:500;color:#185FA5;}
.guia-btn:hover{background:#E6F1FB;border-color:#B5D4F4;}
.proto-box{background:#f8f7f5;border-radius:8px;padding:10px 12px;margin-bottom:8px;border:1px solid #e8e8e8;font-size:13px;line-height:1.7;}
.proto-box.warning{background:#FAEEDA;border-color:#FAC775;}
.proto-box.danger{background:#FCEBEB;border-color:#F7C1C1;}
.proto-box.ok{background:#EAF3DE;border-color:#C0DD97;}
.proto-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:6px;margin-top:10px;}
.drug-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px;}
.drug-table th{background:#f0f0f0;padding:5px 8px;border:1px solid #e0e0e0;font-size:11px;color:#666;text-align:left;}
.drug-table td{padding:5px 8px;border:1px solid #e0e0e0;vertical-align:top;}
.drug-table tr:nth-child(even) td{background:#f8f7f5;}
</style>
</head>

function dias(fecha){
  if(!fecha)return null;
  var d=new Date(fecha),h=new Date();
  h.setHours(0,0,0,0);d.setHours(0,0,0,0);
  return Math.floor((h-d)/86400000);
}
function hoy(){return new Date().toISOString().split('T')[0];}
function fmtF(f){if(!f)return'—';var p=f.split('-');return p[2]+'/'+p[1]+'/'+p[0];}

// SALA

function getSituacionClinica(p){
  var t=getTipo(p);
  if(t==='pre')return 'Pretrasplante';
  if(t==='retx')return 'Retrasplante';
  var dp=dias(p.fecha_tx);
  if(p.momento==='post_inmediato')return 'Postrasplante inmediato (0–7 días)';
  if(p.momento==='post_temprano')return 'Postrasplante temprano (>7 días – <1 año)';
  if(p.momento==='post_tardio')return 'Postrasplante tardío (>1 año)';
  return 'Postrasplante';
}

function getProblemasActivos(p){
  // hasta 3 problemas activos — usa campos estructurados prob1/2/3 (con detalle), con fallback a datos viejos
  var probs=[];
  for(var i=1;i<=3;i++){
    var cat=p['prob'+i];
    var det=p['prob'+i+'_det'];
    if(cat)probs.push(cat+(det?': '+det:''));
  }
  if(probs.length===0){
    // Fallback para pacientes cargados antes de este cambio
    var t=getTipo(p);
    if(t==='pre'||t==='retx'){
      var evals=['cardio','neumo','nefro','infecto','neuro','orl','oftalmo','salud_mental','s_social','alimentacion','gineco'];
      var labels={cardio:'Cardiología',neumo:'Neumología',nefro:'Nefrología',infecto:'Infectología',neuro:'Neurología',orl:'ORL',oftalmo:'Oftalmología',salud_mental:'Salud Mental',s_social:'Serv. Social',alimentacion:'Alimentación',gineco:'Ginecología'};
      evals.forEach(function(e){if(p['eval_'+e]==='pendiente')probs.push('Evaluación pendiente: '+labels[e]);});
      if(p.problema_actual)probs.push(p.problema_actual);
    } else {
      if(p.rechazo&&p.rechazo!=='No')probs.push('Rechazo: '+p.rechazo);
      if(p.vascular&&p.vascular!=='No')probs.push('Vascular: '+p.vascular);
      if(p.biliar&&p.biliar!=='No')probs.push('Biliar: '+p.biliar);
      if(p.infec&&p.infec!=='No')probs.push('Infección: '+p.infec);
      if(p.ptld&&p.ptld!=='No')probs.push('PTLD: '+p.ptld);
      if(p.otras)probs.push(p.otras.split(',')[0].trim());
    }
    if(p.pendientes){p.pendientes.split('\n').forEach(function(l){if(l.trim()&&probs.length<6)probs.push(l.trim());});}
  }
  return probs.slice(0,3);
}

function getPlanesActivos(p){
  // hasta 3 planes activos — usa campos estructurados plan1/2/3, con fallback a datos viejos
  var planes=[];
  for(var i=1;i<=3;i++){
    var cat=p['plan'+i];
    var det=p['plan'+i+'_det'];
    if(cat)planes.push(cat+(det?': '+det:''));
  }
  if(planes.length===0){
    var t=getTipo(p);
    if(t==='pre'||t==='retx'){
      planes.push('Espera de órgano'+(p.lista_estado?' ('+p.lista_estado+')':''));
      if(p.dvr_yn==='Sí')planes.push('Evaluación DVR en curso');
    } else {
      if(p.tacro)planes.push('Inmunosupresión: FK '+p.tacro+' ng/mL');
      if(p.mmf&&p.mmf!=='No')planes.push('MMF '+p.mmf);
    }
    if(p.abx&&p.abx.length)planes.push('Antiinfecciosos: '+p.abx.slice(0,2).join(', '));
    if(p.vent&&p.vent!=='Sin soporte')planes.push('Soporte respiratorio: '+p.vent);
    if(p.hemodi&&p.hemodi!=='No')planes.push('Soporte hemodinámico: '+p.hemodi);
    if(p.nutri&&p.nutri!=='—'&&p.nutri!=='Oral')planes.push('Soporte nutricional: '+p.nutri);
    if(p.obs){
      var firstLine=p.obs.split('\n')[0];
      if(firstLine&&planes.length<5)planes.push(firstLine.substring(0,60));
    }
  }
  return planes.slice(0,3);
}

function getBarreraAlta(p){
  // Barrera principal para el alta — usa campo estructurado barrera_principal, con fallback
  if(p.barrera_principal)return {texto:p.barrera_principal, cat:'estructurada'};
  var t=getTipo(p);
  if(t==='pre'||t==='retx')return {texto:'Espera de órgano', cat:'organo'};
  if(p.infec&&p.infec!=='No')return {texto:'Infección activa: '+p.infec, cat:'infeccion'};
  var pends=getPends(p);
  if(pends.length){
    var pendLower=pends[0].toLowerCase();
    if(pendLower.indexOf('angio')>=0||pendLower.indexOf('cirug')>=0||pendLower.indexOf('drenaje')>=0||pendLower.indexOf('biopsia')>=0||pendLower.indexOf('veda')>=0)
      return {texto:'Procedimiento pendiente: '+pends[0], cat:'procedimiento'};
    return {texto:pends[0], cat:'otro'};
  }
  if(p.rechazo&&p.rechazo!=='No')return {texto:'Ajuste de inmunosupresión (rechazo)', cat:'is'};
  if(p.vascular&&p.vascular!=='No')return {texto:'Procedimiento pendiente: '+p.vascular, cat:'procedimiento'};
  if(p.biliar&&p.biliar!=='No')return {texto:'Procedimiento pendiente: '+p.biliar, cat:'procedimiento'};
  if(p.nutri==='NPT'||p.nutri==='NPT + SNG')return {texto:'Nutrición / tolerancia oral', cat:'nutricion'};
  return {texto:'Sin barrera activa registrada', cat:'ninguna'};
}

function getAltaEsperada(p){
  var dpa=diasParaAlta(p);
  if(dpa.dias===null)return {texto:'En espera de órgano', clase:'alta-organo', icono:'⏳'};
  if(dpa.dias<=3)return {texto:'≤72 horas', clase:'alta-si', icono:'🟢'};
  return {texto:'>72 horas', clase:'alta-no', icono:'🔴'};
}

function getDiasUCI_CIM(p){
  var di=dias(p.fecha_ingreso);
  var movs=p.movimientos||[];
  if(movs.length===0){
    // Sin registro de movimientos: metodo simplificado (toda la internacion en la sala actual)
    var esUCI=p.sala&&p.sala.toLowerCase().indexOf('uci')>=0;
    return {total:di, uci:esUCI?di:null, cim:!esUCI?di:null};
  }
  // Con registro de movimientos: sumar dias de cada tramo
  var diasUci=0, diasCim=0;
  var sorted=movs.slice().sort(function(a,b){return new Date(a.fecha)-new Date(b.fecha);});
  for(var i=0;i<sorted.length;i++){
    var inicio=sorted[i].fecha;
    var fin=(i+1<sorted.length)?sorted[i+1].fecha:hoy();
    var d1=new Date(inicio), d2=new Date(fin);
    d1.setHours(0,0,0,0);d2.setHours(0,0,0,0);
    var dT=Math.max(0,Math.floor((d2-d1)/86400000));
    var unidad=(sorted[i].unidad||'').toLowerCase();
    if(unidad.indexOf('uci')>=0)diasUci+=dT;
    else if(unidad.indexOf('cim')>=0)diasCim+=dT;
  }
  return {total:diasUci+diasCim, uci:diasUci, cim:diasCim};
}

function toggleLocDetalle(cual){
  var wrap=document.getElementById('loc-detalle-'+cual+'-wrap');
  if(!wrap)return;
  var otraId=cual==='uci'?'cim':'uci';
  var otraWrap=document.getElementById('loc-detalle-'+otraId+'-wrap');
  if(otraWrap)otraWrap.style.display='none';
  wrap.style.display=(wrap.style.display==='none')?'block':'none';
}

function getTipo(p){
  if(p.momento==='retx')return'retx';
  if(p.momento==='pre')return'pre';
  return'post';
}
function getTipoLabel(p){
  var t=getTipo(p);
  if(t==='pre')return'Pre-trasplante';
  if(t==='retx')return'Re-trasplante';
  var m={post_inmediato:'Post-Tx inmediato',post_temprano:'Post-Tx temprano',post_tardio:'Post-Tx tardío (>6m)'};
  return m[p.momento]||'Post-Tx';
}
function getPends(p){
  var out=[];
  if(p.momento==='pre'||p.momento==='retx'){
    var evals=['cardio','neumo','nefro','infecto','neuro','orl','oftalmo','salud_mental','s_social','alimentacion','gineco'];
    evals.forEach(function(e){if(p['eval_'+e]==='pendiente')out.push(e.replace('_',' '));});
  }
  if(p.pendientes){p.pendientes.split('\n').forEach(function(l){if(l.trim())out.push(l.trim());});}
  return out;
}

function renderSala(pxs){
  document.getElementById('st0').textContent=pxs.length;
  document.getElementById('st1').textContent=pxs.filter(function(p){return p.momento==='pre';}).length;
  document.getElementById('st2').textContent=pxs.filter(function(p){return p.momento&&p.momento!=='pre'&&p.momento!=='retx';}).length;
  document.getElementById('st3').textContent=pxs.filter(function(p){return p.momento==='retx';}).length;

  var uci=pxs.filter(function(p){return p.sala&&p.sala.toLowerCase().indexOf('uci')>=0;});
  var cim=pxs.filter(function(p){return p.sala&&p.sala.toLowerCase().indexOf('cim')>=0;});
  var otros=pxs.filter(function(p){return p.sala&&p.sala.toLowerCase().indexOf('uci')<0&&p.sala.toLowerCase().indexOf('cim')<0;});

  function contarPorNumero(lista, prefijo, orden){
    var conteo={};
    lista.forEach(function(p){
      var m=p.sala.match(/(\d+)/);
      var num=m?m[1]:'?';
      conteo[num]=(conteo[num]||0)+1;
    });
    var filas='';
    orden.forEach(function(num){
      if(conteo[num])filas+='<div class="loc-sub-row"><span>'+prefijo+' '+num+'</span><span class="loc-sub-n">'+conteo[num]+'</span></div>';
    });
    // Agregar números no contemplados en el orden, al final
    Object.keys(conteo).forEach(function(num){
      if(orden.indexOf(num)<0)filas+='<div class="loc-sub-row"><span>'+prefijo+' '+num+'</span><span class="loc-sub-n">'+conteo[num]+'</span></div>';
    });
    return filas;
  }

  var ucisubFilas=contarPorNumero(uci,'UCI',['72','44','45']);
  var cimsubFilas=contarPorNumero(cim,'CIM',['61','41','62','63','74','75']);

  var locHtml='';
  if(uci.length){
    locHtml+='<div class="loc loc-uci" onclick="toggleLocDetalle(\'uci\')" style="cursor:pointer;">';
    locHtml+='<div class="loc-n">'+uci.length+'</div><div class="loc-l">UCI ▾</div>';
    locHtml+='</div>';
  }
  if(cim.length){
    locHtml+='<div class="loc loc-cim" onclick="toggleLocDetalle(\'cim\')" style="cursor:pointer;">';
    locHtml+='<div class="loc-n">'+cim.length+'</div><div class="loc-l">CIM ▾</div>';
    locHtml+='</div>';
  }
  otros.forEach(function(p){locHtml+='<div class="loc loc-otro"><div class="loc-n">1</div><div class="loc-l">'+p.sala+'</div></div>';});
  document.getElementById('loc-row').innerHTML=locHtml;

  document.getElementById('loc-detalle-uci').innerHTML=ucisubFilas;
  document.getElementById('loc-detalle-cim').innerHTML=cimsubFilas;

  if(!pxs.length){document.getElementById('cards').innerHTML='<div style="text-align:center;padding:2rem;color:#888;">No hay pacientes. Tocá + Nuevo para agregar.</div>';return;}

  // Ordenar: UCI primero, luego el resto
  var pxsOrdenados=pxs.slice().sort(function(a,b){
    var aUci=a.sala&&a.sala.toLowerCase().indexOf('uci')>=0?0:1;
    var bUci=b.sala&&b.sala.toLowerCase().indexOf('uci')>=0?0:1;
    return aUci-bUci;
  });

  var tipoCls={pre:'s-pre',post:'s-post',retx:'s-retx'};
  var cbCls={pre:'cb-pre',post:'cb-post',retx:'cb-retx'};
  var html='';
  pxsOrdenados.forEach(function(p){
    var t=getTipo(p);
    var di=dias(p.fecha_ingreso);
    var problemas=getProblemasActivos(p);
    var planes=getPlanesActivos(p);
    var barrera=getBarreraAlta(p);
    var alta=getAltaEsperada(p);
    html+='<div class="card" onclick="showDet('+p.id+')">';
    // ¿Quién es?
    html+='<div class="card-top"><div class="strip '+tipoCls[t]+'"></div><div style="flex:1;min-width:0;">';
    html+='<div class="cname">'+p.nombre+'</div>';
    html+='<div class="csub">'+(p.edad||'')+(p.peso?' · '+p.peso+' kg':'')+' · '+(p.diag||'—')+'</div>';
    // ¿Dónde está?
    if(p.sala)html+='<div class="csub" style="font-weight:600;">📍 '+(p.sala)+(p.lugar_int?' — Cama '+p.lugar_int:'')+'</div>';
    html+='<div class="cbrow"><span class="cb '+cbCls[t]+'">'+getSituacionClinica(p)+'</span>';
    html+='</div></div></div>';
    // ¿Qué problemas tiene?
    if(problemas.length){
      html+='<div class="card-section card-problemas"><div class="card-sec-lbl">⚠ Problemas activos</div>';
      problemas.forEach(function(pr,i){html+='<div class="card-sec-item">'+(i+1)+'. '+pr+'</div>';});
      html+='</div>';
    }
    // ¿Qué estamos haciendo?
    if(planes.length){
      html+='<div class="card-section card-planes"><div class="card-sec-lbl">✓ Planes activos</div>';
      planes.forEach(function(pl,i){html+='<div class="card-sec-item">'+(i+1)+'. '+pl+'</div>';});
      html+='</div>';
    }
    // ¿Qué le falta para irse?
    html+='<div class="card-section card-alta '+alta.clase+'">';
    html+='<div class="card-sec-lbl">'+alta.icono+' Alta esperada: '+alta.texto+'</div>';
    html+='<div class="card-sec-item" style="font-weight:600;">Barrera: '+barrera.texto+'</div>';
    if(di!==null)html+='<div class="card-sec-item" style="font-size:10px;color:#888;">Internado '+di+' día'+(di===1?'':'s')+'</div>';
    html+='</div>';
    html+='</div>';
  });
  document.getElementById('cards').innerHTML=html;
}

function ftag(e,t){
  if(e.key!=='Enter')return;e.preventDefault();
  var i=document.getElementById('fi'+t);var v=i.value.trim();if(!v)return;
  FT[t].push(v);i.value='';frtags(t);
}
function frtags(t){
  var w=document.getElementById('fw'+t),i=document.getElementById('fi'+t);
  if(!w||!i)return;
  while(w.querySelector('.tg'))w.querySelector('.tg').remove();
  var cls=t==='a'?'t-a':t==='t'?'t-t':'t-i';
  FT[t].forEach(function(v,j){
    var d=document.createElement('div');d.className='tg '+cls;
    d.innerHTML=v+'<span class="tx" onclick="frmtag(\''+t+'\','+j+')">×</span>';
    w.insertBefore(d,i);
  });
}
function frmtag(t,j){FT[t].splice(j,1);frtags(t);}

function scoreDetalle(p){
  var b=parseFloat(p.bili)||0,ir=parseFloat(p.inr)||0,tp=parseFloat(p.tp)||0;
  var al=parseFloat(p.alb)||0,cr=parseFloat(p.creat)||0,tg=parseFloat(p.tgo)||0;
  var dp=dias(p.fecha_tx)||0;
  var s=0;
  if(b>3)s++;if(b>5)s+=2;if(b>10)s+=2;if(b>20)s+=3;
  if(ir>1.5)s++;if(ir>2)s+=2;if(ir>3)s+=2;
  if(tp>0&&tp<50)s+=2;if(al>0&&al<3)s++;if(cr>1)s++;if(cr>2)s+=2;
  if(tg>500)s++;if(tg>1000)s+=2;
  var r=p.rechazo||'';
  if(r==='Agudo leve')s+=2;if(r==='Agudo moderado')s+=4;if(r==='Agudo grave'||r==='Humoral (AMR)')s+=7;if(r==='Crónico / ductopénico')s+=5;
  if(p.vascular&&p.vascular!=='No')s+=6;if(p.biliar&&p.biliar!=='No')s+=3;
  var inf=p.infec||'';if(inf==='Bacteriana')s+=2;
  if(['CMV','EBV','Adenovirus','Viral (otro)'].indexOf(inf)>=0)s+=3;
  if(inf==='Fúngica'||inf==='Múltiple')s+=5;
  if(p.estado&&p.estado.indexOf('Inestable')>=0)s+=3;
  if(p.estado&&p.estado.indexOf('Crítico')>=0)s+=7;
  var h=p.hemodi||'';if(h&&h!=='No')s+=(h==='Múltiples vasoactivos'?5:3);
  if(s<=4)return{niv:'Evolución favorable',cls:'b-ok',de:Math.max(3,7-Math.floor(dp/5))};
  if(s<=10)return{niv:'Complejidad moderada',cls:'b-med',de:Math.max(7,21-Math.floor(dp/3))};
  if(s<=18)return{niv:'Alta complejidad',cls:'b-mal',de:Math.max(14,45-Math.floor(dp/2))};
  return{niv:'Crítico',cls:'b-mal',de:null};
}

function lload(){try{var d=localStorage.getItem(SK);return d?JSON.parse(d):[];}catch(e){return[];}}
function psave(d){try{localStorage.setItem(SK+'_p',JSON.stringify(d));}catch(e){}}

function obUpdate(){
  var b=document.getElementById('ob');if(!b)return;
  if(!online){b.textContent='Sin conexión — los cambios se sincronizan al volver la señal.';b.className='offline-bar show';}
  else if(pending.length){b.textContent=pending.length+' cambio(s) pendiente(s) de sincronizar.';b.className='offline-bar show';}
  else{b.className='offline-bar';}
}

var PROTEGIDOS={}; // ids de pacientes guardados localmente que el servidor todavía puede no reflejar

function pull(){
  if(!online)return;
  fetch(SU+'?action=list',{cache:'no-store'})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.pacientes){
      var serverData=d.pacientes;
      var localData=lload();
      var serverIds=serverData.map(function(x){return x.id;});
      Object.keys(PROTEGIDOS).forEach(function(idStr){
        if(serverIds.indexOf(Number(idStr))>=0 || serverIds.indexOf(idStr)>=0) delete PROTEGIDOS[idStr];
      });
      var protegidosFaltantes=localData.filter(function(p){
        return PROTEGIDOS[p.id] && serverIds.indexOf(p.id)<0;
      });
      var merged=serverData.concat(protegidosFaltantes);
      lsave(merged);PXS=merged;renderSala(merged);dot('ok');
    }
  }).catch(function(){dot('er');});
}

function push(body,cb){
  fetch(SU,{method:'POST',body:JSON.stringify(body)})
  .then(function(r){return r.json();})
  .then(function(resp){if(cb)cb(resp);})
  .catch(function(){if(cb)cb(null);});
}

function flush(cb){
  if(!pending.length||!online){if(cb)cb();return;}
  var ops=pending.slice();pending=[];psave([]);
  var i=0;
  function next(){
    if(i>=ops.length){if(cb)cb();return;}
    push(ops[i],function(){i++;next();});
    i++;
  }
  next();
  obUpdate();
}

function savePx(p){
  dot('sy');
  var data=lload();
  if(EID)data=data.filter(function(x){return x.id!==EID;});
  data.push(p);lsave(data);PXS=data;EID=null;
  renderSala(data);showSala();
  if(online){
    PROTEGIDOS[p.id]=true;
    push({action:'save',paciente:p},function(resp){
      if(resp&&resp.ok){dot('ok');}else{dot('er');}
      pull();
    });
  }else{
    pending.push({action:'save',paciente:p});psave(pending);obUpdate();dot('of');
  }
}

function delPx(id){
  if(!confirm('¿Eliminar este paciente?'))return;
  var data=lload().filter(function(p){return p.id!==id;});
  lsave(data);PXS=data;renderSala(data);showSala();
  if(online)push({action:'delete',id:id},function(){pull();});
  else{pending.push({action:'delete',id:id});psave(pending);obUpdate();}
}

function darAlta(id){
  var p=PXS.find(function(x){return x.id===id;});if(!p)return;
  if(!confirm('¿Dar de alta a '+p.nombre+'?\nEl paciente se archivará y no aparecerá más en el pase activo.'))return;
  var pAlta=Object.assign({},p,{alta:true,fecha_alta:hoy()});
  try{var altas=JSON.parse(localStorage.getItem(SK+'_altas')||'[]');altas.push(pAlta);localStorage.setItem(SK+'_altas',JSON.stringify(altas));}catch(e){}
  var data=lload().filter(function(x){return x.id!==id;});
  lsave(data);PXS=data;renderSala(data);showSala();
  if(online){push({action:'save_alta',paciente:pAlta},function(){});push({action:'delete',id:id},function(){pull();});}
  else{pending.push({action:'delete',id:id});psave(pending);obUpdate();}
}

function diasParaAlta(p) {
  var t = getTipo(p);
  var dp = t !== 'pre' ? dias(p.fecha_tx) : null;

  if (t === 'pre' || t === 'retx') {
    return { dias: null, texto: 'En lista de espera', clase: 'dpa-lista', motivos: [] };
  }

  var base = 0;
  if (p.momento === 'post_inmediato') {
    var diasRestantes = Math.max(0, 25 - (dp || 0));
    base = diasRestantes;
  } else if (p.momento === 'post_temprano') {
    base = 14;
  } else if (p.momento === 'post_tardio') {
    base = 7;
  }

  var extra = 0;
  var motivos = [];

  var bil = parseFloat(p.bili) || 0;
  var inr = parseFloat(p.inr) || 1;
  var cr  = parseFloat(p.creat) || 0;

  if (bil > 10) { extra += 14; motivos.push('colestasis severa'); }
  else if (bil > 5) { extra += 7; motivos.push('colestasis moderada'); }

  if (inr > 2) { extra += 7; motivos.push('coagulopatía'); }
  if (cr > 2)  { extra += 7; motivos.push('insuficiencia renal'); }

  var rec = (p.rechazo || '').toLowerCase();
  if (rec.indexOf('moderado') >= 0) { extra += 14; motivos.push('rechazo moderado'); }
  else if (rec.indexOf('grave') >= 0 || rec.indexOf('humoral') >= 0) { extra += 30; motivos.push('rechazo grave'); }
  else if (rec.indexOf('crónico') >= 0 || rec.indexOf('cronico') >= 0) { extra += 30; motivos.push('rechazo crónico'); }
  else if (rec.indexOf('leve') >= 0) { extra += 7; motivos.push('rechazo leve'); }

  var vas = (p.vascular || '').toLowerCase();
  if (vas && vas !== 'no' && vas !== '') {
    if (vas.indexOf('trombosis') >= 0) { extra += 21; motivos.push('trombosis vascular'); }
    else { extra += 14; motivos.push('complicación vascular'); }
  }

  var inf = (p.infec || '');
  if (inf && inf !== 'No') {
    if (inf === 'Múltiple' || inf === 'Fúngica') { extra += 21; motivos.push('infección compleja'); }
    else { extra += 10; motivos.push('infección activa'); }
  }

  var bil2 = (p.biliar || '').toLowerCase();
  if (bil2 && bil2 !== 'no' && bil2 !== '') { extra += 14; motivos.push('comp. biliar'); }

  var ptld = (p.ptld || '').toLowerCase();
  if (ptld && ptld !== 'no' && ptld !== '') { extra += 21; motivos.push('PTLD'); }

  var est = (p.estado || '').toLowerCase();
  if (est.indexOf('crítico') >= 0) { extra += 30; motivos.push('estado crítico'); }
  else if (est.indexOf('inestable') >= 0) { extra += 14; motivos.push('inestable'); }

  if (p.dias_alta_manual !== undefined && p.dias_alta_manual !== null && p.dias_alta_manual !== '') {
    return {
      dias: parseInt(p.dias_alta_manual),
      texto: parseInt(p.dias_alta_manual) + ' días (estimado médico)',
      clase: 'dpa-manual',
      motivos: []
    };
  }

  var total = base + extra;
  total = Math.max(1, total);

  var clase = total <= 7 ? 'dpa-ok' : total <= 21 ? 'dpa-med' : 'dpa-mal';
  var texto = total + ' días estimados para el alta';

  return { dias: total, texto: texto, clase: clase, motivos: motivos };
}

function guardarDPA(id){
  var val=document.getElementById('dpa-edit')?document.getElementById('dpa-edit').value:'';
  var p=PXS.find(function(x){return x.id===id;});
  if(!p)return;
  p.dias_alta_manual=val?parseInt(val):null;
  p.ts=Date.now();
  var data=lload();
  var idx=-1;
  for(var i=0;i<data.length;i++){if(data[i].id===id){idx=i;break;}}
  if(idx>=0)data[idx]=p; else data.push(p);
  lsave(data);PXS=data;
  if(online)push({action:'save',paciente:p},function(){pull();});
  renderDet(p);
}

}

  var el=document.getElementById('sdot'),sl=document.getElementById('slbl');

}

try {
  var existing = localStorage.getItem('pase_v8');
  var existingData = existing ? JSON.parse(existing) : [];
  var existingIds = existingData.map(function(p){return p.id;});
  var toAdd = PRELOAD.filter(function(p){return existingIds.indexOf(p.id)<0;});
  if(toAdd.length > 0){
    var merged = existingData.concat(toAdd);
    localStorage.setItem('pase_v8', JSON.stringify(merged));
  } else if(existingData.length === 0) {
    localStorage.setItem('pase_v8', JSON.stringify(PRELOAD));
  }
} catch(e) {}

PROTOCOLOS.ramct={title:'Rechazo Agudo (RAMCT) — Garrahan',html:'<div class="proto-h">Prevalencia: 25-50% Tx pediatricos. Diagnostico (Banff): inflamacion portal mixta + inflamacion conductos biliares + endoteliolitis.</div><div class="proto-box ok"><b>A. Leve sin disfuncion:</b> FK 6-9 ng/mL x3m. Prednisona VO: &lt;20kg: 4mg/d · ≥20kg: 8mg/d x3m.</div><div class="proto-box warning"><b>B. Leve con disfuncion:</b> FK 9-12 ng/mL. Metilprednisolona EV 10mg/kg/d x3 dias. Prednisona VO segun peso x3m.</div><div class="proto-box danger"><b>C. Moderado-Severo:</b> FK 9-12 ng/mL. MP EV 10mg/kg/d x3d. MMF: 10mg/kg/dosis c/12h x2sem → 40mg/kg/d. Profilaxis P.jirovecii y ulcera gastrica.</div><div class="proto-box danger"><b>D. Corticorresistente</b> (sin reduccion ≥50% transaminasas tras 3° pulso):<br>Rebiopsia + DSA single antigen. Reducir FK 4-6 ng/mL. Timoglobulina 1mg/kg/d x7 dias. Profilaxis CMV, hongos y P.jirovecii.</div>'};
PROTOCOLOS.tah={title:'Trombosis Arteria Hepatica (TAH)',html:'<div class="proto-box danger"><b>EMERGENCIA QUIRURGICA</b> — Prevalencia 5-10%. Sin tratamiento: perdida del injerto 80-90%.</div><div class="proto-h">Diagnostico</div><div class="proto-box">Eco Doppler: patron tardus-parvus, IR &lt;0.5 → TC trifasica → Angiografia DSA (confirmatorio)</div><div class="proto-h">Manejo segun presentacion</div><div class="proto-box warning"><b>Estenosis &gt;50%:</b> angioplastia con balon + anticoagulacion x6 meses</div><div class="proto-box danger"><b>Trombosis temprana (&lt;48h):</b> trombectomia + anticoagulacion x6 meses</div><div class="proto-box danger"><b>Con falla del injerto, sepsis o fistula biliar:</b> RETRASPLANTE URGENTE → inscribir Emergencia Nacional</div><div class="proto-box danger"><b>Trombosis tardia con colangiopatia:</b> retrasplante programado</div>'};
PROTOCOLOS.tpp={title:'Trombosis Portal Post-Tx (TPP)',html:'<div class="proto-box danger">Prevalencia: 5-15% pediatricos. Forma temprana (&lt;30 dias): perdida del injerto &gt;50% sin tratamiento.</div><div class="proto-h">Diagnostico</div><div class="proto-box">Eco Doppler portal: disminucion o ausencia de flujo → TC trifasica con reconstruccion 3D</div><div class="proto-h">Manejo</div><div class="proto-box warning"><b>Estenosis portal:</b> portoplastia con balon + anticoagulacion x6 meses. Recurrencia tras 2 dilataciones → stent</div><div class="proto-box danger"><b>Trombosis temprana (&lt;48h):</b> trombectomia quirurgica</div><div class="proto-box danger"><b>Con falla del injerto:</b> retrasplante urgente</div>'};
PROTOCOLOS.cmv={title:'Infeccion por CMV',html:'<div class="proto-box">Prevalencia: 20-30% Tx pediatricos. Mortalidad ≈10%. Tiempo: primeros 3 meses post-Tx.</div><div class="proto-h">Diagnostico</div><div class="proto-box">PCR cuantitativa en plasma <b>&gt;5000 UI/mL</b>. Biopsia con inmunohistoquimica (cuerpos de inclusion).</div><div class="proto-h">Tratamiento</div><div class="proto-box warning"><b>Ganciclovir IV:</b> 10mg/kg/dia c/12h por ≥2 semanas hasta mejoria clinica y negativizacion de 2 cargas virales consecutivas.<br>Monitoreo semanal: carga viral, leucocitos, plaquetas, creatinina.<br>NO reducir dosis por leucopenia o trombocitopenia. Ajustar a funcion renal.</div><div class="proto-box"><b>Transicion a Valganciclovir VO:</b> 900mg c/12h tras mejoria clinica.</div><div class="proto-box danger"><b>CMV refractario</b> (sin descenso &gt;1 log en 2 sem):<br>Solicitar mutaciones UL97 y UL54 (ANLIS-Malbran). Foscarnet si resistencia confirmada.</div>'};
PROTOCOLOS.ptld={title:'PTLD — Sindrome Linfoproliferativo',html:'<div class="proto-box danger">Prevalencia: 5-10%. Mortalidad ≈40%. 80% casos VEB+ en 1° año post-Tx.</div><div class="proto-h">Clinica</div><div class="proto-box">Fiebre &gt;3d sin foco · Perdida de peso · Nodal: hipertrofia amigdalas, adenomegalias, visceromegalias · Extranodal: citopenia, hepatitis (33%), ascitis, neumonitis, encefalitis</div><div class="proto-h">Diagnostico</div><div class="proto-box">Hemograma: &gt;5% linfocitos atipicos. Anti-CD20. LDH. PCR VEB en plasma. PET-TC para estadificacion. Biopsia tumoral (CD20 y EBER).</div><div class="proto-h">Factores de mal pronostico</div><div class="proto-box warning">Inicio tardio (&gt;1 año) · Compromiso multiorganico · LDH ≥1000 UI/L · PTLD monomofico EBV negativo · Sin respuesta a RIS en 4 semanas</div><div class="proto-h">Manejo</div><div class="proto-box"><b>1.</b> Reducir inmunosupresion (RIS)</div><div class="proto-box warning"><b>2. PTLD monomofica B CD20+:</b> Rituximab EV 375 mg/m² semanal x3-4 dosis (goteo lento 4-6h). Premedicacion: acetaminofen + difenhidramina.</div><div class="proto-box danger"><b>3. Burkitt, Linfoma T o Hodgkin:</b> quimioterapia multidroga</div>'};
PROTOCOLOS.biliar={title:'Complicaciones Biliares Post-Tx',html:'<div class="proto-h">Fistula Biliar — Prevalencia ≈15% (predominio 1° mes)</div><div class="proto-box warning"><b>Manejo:</b><br>1. Verificar permeabilidad arteria hepatica (Eco Doppler)<br>2. Si permeable + fistula anastomotica:<br>   • Receptor &gt;40 kg: CPRE con esfinterotomia ± stent<br>   • &lt;40 kg: drenaje transhepatico percutaneo<br>3. Trombosis arterial → evaluar retrasplante</div><div class="proto-h">Estenosis Biliar — Prevalencia ≈35% (primeros 6 meses)</div><div class="proto-box warning"><b>Manejo:</b><br>1. Confirmar permeabilidad arteria hepatica<br>2. Si permeable:<br>   • Coledoco-coledoco + &gt;40 kg: CPRE dilatacion balon ± stent<br>   • Anastomosis biliodigestiva: drenaje percutaneo x6 meses<br>3. Fracaso → reconstruccion quirurgica biliar<br>4. Trombosis arterial o colangiopatia isquemica → retrasplante</div><div class="proto-box"><b>AUDC:</b> 30 mg/kg/dia VO c/12h (max 450mg c/12h)</div>'};
PROTOCOLOS.profilaxis={title:'Profilaxis Post-Tx Inmediato — Garrahan',html:'<div class="proto-h">Infecciosa</div><table class="drug-table"><tr><th>Tipo</th><th>Farmaco</th><th>Dosis</th><th>Duracion</th></tr><tr><td>Bacteriana</td><td>Pip-Tazo</td><td>300 mg/kg/dia EV c/6h</td><td>24-48h</td></tr><tr><td>P. jirovecii</td><td>TMP-SMX</td><td>5 mg/kg/dosis TMP 3x/sem</td><td>6 meses</td></tr><tr><td>CMV D+/R-</td><td>Ganciclovir → Valganciclovir</td><td>5mg/kg c/12h → 900mg/d</td><td>3-6 meses</td></tr><tr><td>Antifungica alto riesgo</td><td>Anidulafungina</td><td>Carga 3mg/kg → 1.5mg/kg/d</td><td>7-14 dias</td></tr><tr><td>Antifungica estandar</td><td>Fluconazol</td><td>6-12 mg/kg/dia</td><td>7 dias</td></tr></table><div class="proto-h">Antitrombótica</div><div class="proto-box">• ATIII: 50 UI/kg EV al cierre; repetir si &lt;70%<br>• Heparina sodica: &gt;1 año: 15 UI/kg/h / &lt;1 año: 20 UI/kg/h — desde 24-48h si RIN &lt;1.8 y plaquetas &gt;40.000<br>• AAS: 3-5 mg/kg/dia x6 meses</div><div class="proto-h">IS segun riesgo ABO compatible</div><table class="drug-table"><tr><th>Riesgo</th><th>Criterio</th><th>Induccion</th><th>Mantenimiento</th></tr><tr><td>Bajo</td><td>PRA 0%</td><td>MP 10mg/kg EV + Timoglobulina 1.5mg/kg/d x4d</td><td>Tacrolimus 0.1-0.15 mg/kg/d c/12h</td></tr><tr><td>Moderado</td><td>PRA&gt;0%, autoinmunes</td><td>IgG 1g/kg/d x2d + MP + Timoglobulina x4d</td><td>FK + MMF 600mg/m² c/12h + Prednisona 1-2mg/kg/d (→retiro a 3m)</td></tr><tr><td>Alto</td><td>DSA+</td><td>IgG 2g/kg + MP + Timoglobulina + Rituximab 375mg/m²</td><td>FK + MMF + Prednisona en descenso</td></tr></table>'};
PROTOCOLOS.alarma={title:'Signos de Alarma — Primeras 72 horas',html:'<div class="proto-box danger"><b>Hepatico:</b> AST/ALT &gt;5000 UI/L → Eco Doppler urgente (descartar TAH) · Ictericia precoz · Bilirrubina &gt;10 mg/dL persistente o ascendente al dia 5-7 · INR &gt;2 sostenido</div><div class="proto-box danger"><b>Vascular:</b> Ausencia de flujo en arteria hepatica o vena porta → Eco Doppler urgente, reexploracion</div><div class="proto-box warning"><b>Hemodinamico:</b> TAM &lt;p5 → confirmar volemia, eco, vasopresores · Taquicardia &gt;20% basal</div><div class="proto-box warning"><b>Renal:</b> Diuresis &lt;1 mL/kg/h &gt;2h → eco Doppler, optimizar perfusion</div><div class="proto-box warning"><b>Respiratorio:</b> SatO2 &lt;92% con O2 · Falla de extubacion → reintubar, optimizar liquidos</div><div class="proto-box warning"><b>Neurologico:</b> Glasgow ↓ subito → glucosa EV, neuroimagen · Convulsiones → hiponatremia o toxicidad tacrolimus (PRES)</div><div class="proto-box warning"><b>Metabolico:</b> Hipoglucemia &lt;60 mg/dL · Lactato &gt;4 mmol/L persistente</div><div class="proto-box"><b>Infeccioso:</b> Fiebre &gt;38°C o T &lt;36°C → cultivos + ATB empirico urgente</div><div class="proto-h">Laboratorio diario primeros 7 dias</div><div class="proto-box">Gasometria · Lactato · Hepatograma · Coagulograma · Hemograma · Ionograma · Glucemia · Amonio · Albumina · Urea/creatinina · Niveles Tacrolimus. PCR-EBV y CMV semanal.</div>'};
PROTOCOLOS.is={title:'Inmunosupresion — Dosis y Niveles Garrahan',html:'<div class="proto-h">Tacrolimus (FK) — Niveles objetivo</div><div class="proto-box">Dosis inicial: 0.1-0.15 mg/kg/dia VO c/12h (en ayunas)<br><b>Niveles:</b> 1° semestre: 7-10 ng/mL · hasta 1 año: 5-7 ng/mL · &gt;1 año biopsia normal: 3-5 ng/mL<br><b>Interacciones:</b> ↑: macrolidos, azoles, MP, omeprazol · ↓: carbamazepina, fenobarbital, rifampicina</div><div class="proto-h">Metilprednisolona — Esquema reciclado</div><table class="drug-table"><tr><th>Dia</th><th>&gt;40 kg</th><th>20-40 kg</th><th>10-20 kg</th><th>&lt;10 kg</th></tr><tr><td>1</td><td>200mg</td><td>150mg</td><td>100mg</td><td>40mg</td></tr><tr><td>2</td><td>150mg</td><td>100mg</td><td>40mg</td><td>20mg</td></tr><tr><td>3</td><td>100mg</td><td>40mg</td><td>20mg</td><td>16mg</td></tr><tr><td>4</td><td>40mg</td><td>20mg</td><td>16mg</td><td>8mg</td></tr><tr><td>5</td><td>20mg</td><td>16mg</td><td>8mg</td><td>4mg</td></tr><tr><td>6</td><td>16mg</td><td>8mg</td><td>4mg</td><td>—</td></tr><tr><td>7</td><td>8mg</td><td>4mg</td><td>—</td><td>—</td></tr><tr><td>8</td><td>4mg</td><td>—</td><td>—</td><td>—</td></tr></table><div class="proto-h">MMF (Micofenolato Mofetil)</div><div class="proto-box">Dosis: 600 mg/m²/dosis VO/EV c/12h · EA: diarrea, supresion medular, infecciones (CMV) · No asociar con azatioprina</div><div class="proto-h">Timoglobulina</div><div class="proto-box">1.5 mg/kg/dia EV (infusion 6h) x4 dias (total 6 mg/kg). Premedicacion: antihistaminico + paracetamol + corticosteroides. Profilaxis CMV y fungica obligatoria.</div>'};
PROTOCOLOS.peld={title:'PELD / MELD — Mortalidad estimada',html:'<div class="proto-box"><b>PELD:</b> &lt;12 años · <b>MELD:</b> ≥12 años</div><div class="proto-h">Mortalidad estimada a 3 meses (UNOS/OPTN, EASL 2024)</div><table class="drug-table"><tr><th>Score</th><th>Mortalidad a 3m</th><th>Actualizacion</th></tr><tr><td>&lt;9</td><td>&lt;2%</td><td>Anual</td></tr><tr><td>10-14</td><td>≈6%</td><td>Cada 3 meses</td></tr><tr><td>15-19</td><td>≈6-20%</td><td>Cada 30 dias. Considerar Tx</td></tr><tr><td>20-29</td><td>≈20%</td><td>Cada 7 dias. Priorizar</td></tr><tr><td>30-39</td><td>≈53%</td><td>Alta prioridad</td></tr><tr><td>≥40</td><td>≈71%</td><td>Urgencia. Emergencia Nacional</td></tr></table><div class="proto-h">Emergencia Nacional — Criterios</div><div class="proto-box warning">• Falla hepatica fulminante (FHA)<br>• Falla primaria del injerto<br>• Trombosis arteria hepatica &lt;7 dias post-Tx</div>'};
PROTOCOLOS.rechazo_upmc={title:'Rechazo Celular Agudo (ACR) — Manual UPMC',html:'<div class="proto-box">Hasta 40% de niños en los primeros 3 años post-Tx. &gt;70% ocurre en los primeros 6 meses. Raramente lleva a perdida del injerto.</div><div class="proto-h">Diagnostico</div><div class="proto-box">Hepatograma + Eco Doppler (descartar causa tecnica) + biopsia hepatica (infiltrado linfocitario portal, colangitis linfocitaria, endotelitis). Considerar DSA por MFI y ensayo Pleximmune (predice riesgo de rechazo celular de forma no invasiva).</div><div class="proto-h">Tratamiento — Leve a moderado (biopsia)</div><div class="proto-box warning">FK objetivo 10-12 ng/mL. Bolo metilprednisolona 10 mg/kg EV (max 1g). Esquema de descenso:</div><table class="drug-table"><tr><th>Dia</th><th>Dosis (mg/kg/d)</th><th>Frecuencia</th><th>Dosis max/toma</th></tr><tr><td>1</td><td>5</td><td>c/6h (4 tomas)</td><td>50 mg</td></tr><tr><td>2</td><td>4</td><td>c/6h (4 tomas)</td><td>40 mg</td></tr><tr><td>3</td><td>3</td><td>c/8h (3 tomas)</td><td>30 mg</td></tr><tr><td>4</td><td>2</td><td>c/12h (2 tomas)</td><td>20 mg</td></tr></table><div class="proto-box">Luego descenso de 5mg por semana segun hepatograma, con transicion a prednisona VO. Profilaxis antiulcerosa + valganciclovir + nistatina durante IS aumentada.</div><div class="proto-h">Tratamiento — Moderado a severo / corticorresistente</div><div class="proto-box danger">Timoglobulina si dano hepatico significativo o respuesta lenta a corticoides. Si rechazo + AMR asociado (DSA periferico, C4D+, vasculitis): considerar rituximab, bortezomib e inmunoglobulinas. Plasmaferesis en casos seleccionados.<br>MMF como "tercer agente" para reducir mas rapido FK y corticoides si hay complicaciones extrahepaticas (hiperglucemia, insuficiencia renal).</div><div class="proto-h">Rechazo cronico</div><div class="proto-box warning">&lt;5% de receptores, ~70% desarrolla fibrosis y disfuncion del injerto. Bx: ductopenia en 50% de tractos portales + colestasis + fibrosis + arteriopatia.<br>Tto: bolo y reciclado de metilprednisolona, FK objetivo 10-12 ng/mL, agregar MMF o sirolimus. Retrasplante si no responde (sin normalizacion de bilirrubina o persistencia de HTP).</div>'};
PROTOCOLOS.vigilancia_upmc={title:'Vigilancia de Rechazo Subclinico — Manual UPMC',html:'<div class="proto-box">El rechazo subclinico ("silente") no se detecta con hepatograma normal ni niveles de tacrolimus aislados, pero puede progresar a dano cronico del injerto si no se vigila activamente.</div><div class="proto-h">Estrategia de vigilancia ampliada (UPMC)</div><div class="proto-box warning">• Desviacion estandar (SD) de 3-6 niveles consecutivos de tacrolimus previos a cada control — la variabilidad alta predice rechazo<br>• Ensayo Pleximmune anual (mide reactividad celular del receptor contra antigenos del donante vs terceros, no invasivo)<br>• DSA (anticuerpos especificos contra donante) periodicos<br>• Biopsias de vigilancia cada 5 años</div><div class="proto-box">En una serie de 70 receptores con &gt;1 año post-Tx, hasta la mitad de los pacientes con riesgo elevado en estas pruebas no invasivas tenian rechazo confirmado por biopsia o SD de FK ≥2 — aun con hepatograma normal.</div><div class="proto-h">Conducta ante riesgo elevado</div><div class="proto-box">Aumentar inmunosupresion segun hallazgos. Seguimiento a mediano plazo (~400 dias) mostro resolucion de hallazgos de biopsia y de riesgo no invasivo en la mayoria de los casos tratados oportunamente.</div>'};
PROTOCOLOS.herida_upmc={title:'Complicaciones de la Herida Quirurgica — Manual UPMC',html:'<div class="proto-box">La infeccion del sitio quirurgico puede ocurrir hasta en 35% de receptores, desde infeccion superficial hasta absceso intraabdominal. La complicacion tardia mas frecuente es la hernia incisional, casi siempre precedida por una complicacion temprana de la herida.</div><div class="proto-h">Factores de riesgo</div><div class="proto-box">• Desnutricion cronica pretrasplante<br>• Peritonitis o colangitis pretrasplante<br>• Dehiscencia de anastomosis biliar o intestinal<br>• Inmunosupresion (efecto antiproliferativo de corticoides, cicatrizacion enlentecida con sirolimus)<br>• Cierre por etapas con parche abdominal temporal</div><div class="proto-h">Signos de alarma</div><div class="proto-box warning">Eritema, secrecion, dolor en la herida · Fiebre, secrecion purulenta · Dehiscencia fascial · Puede ser el primer signo de infeccion intraabdominal, fuga biliar o intestinal</div><div class="proto-h">Estudios</div><div class="proto-box">Examen de la herida (evaluar integridad fascial) · Rx abdomen (aire subcutaneo) · TC abdomen (proceso intraabdominal)</div><div class="proto-h">Manejo</div><div class="proto-box danger">1. Apertura y drenaje de la infeccion superficial<br>2. Cultivo aerobico, anaerobico y fungico<br>3. ATB empirico de amplio espectro (ej. piperacilina/tazobactam + vancomicina), ajustar segun cultivo<br>4. Exploracion quirurgica de herida o abdomen si se sospecha proceso profundo<br>5. Reparacion fascial si hay dehiscencia<br>6. Cuidado local de herida</div>'};
PROTOCOLOS.cmv_upmc={title:'CMV — Protocolo Completo UPMC',html:'<div class="proto-h">Epidemiologia</div><div class="proto-box">Puede presentarse como infeccion asintomatica (PCR elevada en paciente bien) o enfermedad sintomatica (sindrome viral o enfermedad invasiva de tejido — higado e intestino los mas afectados). La enfermedad por CMV aumenta el riesgo de rechazo celular agudo y de otras infecciones oportunistas.</div><div class="proto-h">Tratamiento de infeccion/enfermedad activa</div><div class="proto-box warning">Ganciclovir 5 mg/kg/dosis EV c/12h (ajustar a funcion renal). Valganciclovir puede considerarse en infeccion asintomatica o enfermedad leve-moderada.<br>Seguir PCR de CMV semanal como marcador de respuesta. Continuar tratamiento hasta carga no cuantificable o negativa x2 semanas. Respuesta clinica esperada en 5-7 dias. Las cargas suelen comenzar a descender en 10-14 dias.</div><div class="proto-box">CMV-Ig (Inmunoglobulina especifica) 300 mg/kg/dosis EV semanal si hay enteritis o neumonitis por CMV, hasta carga no detectable — no siempre necesaria, consultar con Infectologia.<br>Disminuir inmunosupresion segun criterio del medico tratante.</div><div class="proto-box danger"><b>CMV resistente</b> (sin respuesta o empeoramiento tras 2 semanas de ganciclovir): enviar test de resistencia genotipica (UL97/UL54). Considerar foscarnet. Interconsulta con Infectologia.</div><div class="proto-h">Profilaxis post-Tx hepatico (UPMC)</div><div class="proto-box">Pacientes en riesgo (D+/R+, D-/R+, D+/R-): Ganciclovir 5 mg/kg/dosis EV c/12h x14 dias, luego puede completarse con Valganciclovir VO 15-18 mg/kg/dosis por dia (maximo 900 mg/dia).<br>No se da profilaxis en D-/R- (ambos negativos).</div><div class="proto-h">Calendario de vigilancia con PCR</div><table class="drug-table"><tr><th>Periodo post-Tx</th><th>Frecuencia PCR CMV</th></tr><tr><td>0 a 3 meses</td><td>Cada 2 semanas</td></tr><tr><td>3 a 6 meses</td><td>Mensual</td></tr><tr><td>6 a 12 meses</td><td>Cada 3 meses</td></tr></table><div class="proto-h">Profilaxis tras tratamiento de rechazo (IS aumentada)</div><div class="proto-box warning">Cualquier paciente en riesgo (no D-/R-) que recibe pulsos de corticoides EV o anticuerpos antilinfociticos por rechazo debe iniciar ganciclovir preventivo desde la primera dosis del tratamiento de rechazo, continuando 14 dias luego de finalizado.<br>Ganciclovir 5 mg/kg/dia EV o Valganciclovir VO 15-18 mg/kg/dia (ajustar funcion renal).<br>Monitoreo posterior: PCR semanal x2 semanas, luego c/2 semanas x1 mes, luego mensual x2 meses. Si carga &gt;200 cuantificable: continuar valganciclovir hasta no detectable x2.</div>'};


function showProtocolo(key){
  var p=PROTOCOLOS[key];if(!p)return;
  document.getElementById('guia-menu').style.display='none';
  var menuUpmc=document.getElementById('guia-menu-upmc');if(menuUpmc)menuUpmc.style.display='none';
  document.getElementById('guia-content').style.display='';
  document.getElementById('guia-inner').innerHTML='<h2 style="font-size:15px;font-weight:700;margin-bottom:.9rem;">'+p.title+'</h2>'+p.html;
  window.scrollTo(0,0);
}


// ---- AUTH ----
var USERS = {
  'txhepatico': 'trasplante2024',
  'residente': 'trasplante2024',
  'enfermeria': 'trasplante2024'
};
var SESSION_KEY = 'pase_auth_v1';

function checkSession(){
  try{
    var s = sessionStorage.getItem(SESSION_KEY);
    return s === 'ok';
  }catch(e){return false;}
}

function doLogin(){
  var user = document.getElementById('login-user').value.trim().toLowerCase();
  var pass = document.getElementById('login-pass').value;
  var err = document.getElementById('login-error');
  if(USERS[user] && USERS[user] === pass){
    try{sessionStorage.setItem(SESSION_KEY,'ok');}catch(e){}
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-app').style.display='';
    err.className='login-error';
  } else {
    err.className='login-error show';
    document.getElementById('login-pass').value='';
    document.getElementById('login-pass').focus();
  }
}

// Check session on load
if(checkSession()){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='';
}

var localData=lload();
if(localData.length){PXS=localData;renderSala(localData);}else{renderSala([]);}
if(online){
  flush(function(){pull();});
}else{dot('of');obUpdate();}
setInterval(function(){if(online)pull();},15000);
setInterval(function(){if(PXS.length)renderSala(PXS);},60000);
</script>
